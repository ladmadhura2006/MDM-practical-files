<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Feedback</title>

    <style>
        body{
            background: rgba(206, 8, 48, 0.894);
            color: bisque;
            font-family: Arial, Helvetica, sans-serif;
        }
        div{
            width: 340px;
            margin: 70px auto;
            padding: 27px;
            border-radius: 14px;
            background-color: rgb(233, 87, 116);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.409);
        }
        h2{
            text-align:center; color: bisque; font-size:27px;
        }
        label {
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 6px 0 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #83051e;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #bf0729;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background: #84162a;
        }
    </style>
</head>
<body>
<div>
    <h2>Customer Feedback Form</h2>

    <form action="result.html" method="get">
        <label>Name:</label>
        <input type="text" name="name" required><br><br>

        <label>Address:</label>
        <input type="text" name="address" maxlength="100" placeholder="Your Address.." required><br><br>

        <label>Gender:</label>
        <select name="gender" required>
            <option value="">Select</option>
            <option>Female</option>
            <option>Male</option>
            <option>Other</option>
        </select><br><br>

        <label>Mobile No:</label>
        <input type="tel" name="mobile" maxlength="10" required><br><br>

        <label>Email ID:</label>
        <input type="email" name="email" placeholder="abc@gmail.com" required><br><br>

        <input type="submit" value="Submit Feedback" class="btn">
    </form>
</div>

</body>
</html>
